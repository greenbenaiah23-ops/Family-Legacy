<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Young Family Legacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .masonry { display: columns; column-gap: 1rem; column-count: 2; }
        @media (min-width: 768px) { .masonry { column-count: 3; } }
        .break-inside { break-inside: avoid; margin-bottom: 1rem; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%); }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 font-serif">

    <section class="relative h-screen w-full overflow-hidden flex items-end">
        <img src="IMG_3615.jpeg" alt="Family Matriarch" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="relative p-8 text-white z-10">
            <h1 class="text-4xl md:text-6xl font-bold mb-2">The Young Family Legacy</h1>
            <p class="text-lg italic opacity-90">Honoring our roots in Sumter and Leland</p>
            <button onclick="window.print()" class="mt-6 px-6 py-2 bg-white text-black rounded-full font-sans text-sm font-bold uppercase tracking-widest hover:bg-stone-200 transition">
                Save / Print Album
            </button>
        </div>
    </section>

    <main class="p-4 md:p-8">
        <div class="masonry">
            
            <div class="break-inside bg-white p-2 shadow-sm border border-stone-200">
                <img src="IMG_3615.jpeg" class="w-full h-auto">
                <p class="mt-2 text-xs text-stone-500 italic">Family Gathering</p>
            </div>

            <div class="break-inside bg-white p-2 shadow-sm border border-stone-200">
                <img src="IMG_3616.jpeg" class="w-full h-auto">
            </div>

            </div>
    </main>

    <footer class="p-12 text-center text-stone-400 text-sm">
        <p>&copy; 2026 Young Family Archive</p>
    </footer>

</body>
</html>
